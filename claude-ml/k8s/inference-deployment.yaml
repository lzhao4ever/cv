apiVersion: apps/v1
kind: Deployment
metadata:
  name: urban-seg-serve
  namespace: urban-seg
  labels:
    app: urban-seg-serve
spec:
  replicas: 2
  selector:
    matchLabels:
      app: urban-seg-serve
  template:
    metadata:
      labels:
        app: urban-seg-serve
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: server
          image: your-registry/urban-seg:serve
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: MODEL_PATH
              value: /models/model.onnx
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: model-volume
              mountPath: /models
              readOnly: true
      volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: model-artifacts
