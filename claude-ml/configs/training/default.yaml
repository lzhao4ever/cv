# @package _global_.training
max_epochs: 160
val_check_interval: 1.0
log_every_n_steps: 50
gradient_clip_val: 1.0
precision: "16-mixed"           # AMP

optimizer:
  _target_: torch.optim.AdamW
  lr: 6e-5
  weight_decay: 0.01
  betas: [0.9, 0.999]

scheduler:
  _target_: torch.optim.lr_scheduler.PolynomialLR
  power: 1.0
  total_iters: ${training.max_epochs}

loss:
  ce_weight: 1.0
  dice_weight: 1.0
  ignore_index: ${data.ignore_index}

callbacks:
  checkpoint:
    monitor: val/mIoU
    mode: max
    save_top_k: 3
    filename: "epoch={epoch:03d}-miou={val/mIoU:.4f}"
  early_stopping:
    monitor: val/mIoU
    mode: max
    patience: 20
  lr_monitor:
    logging_interval: step

logger:
  mlflow:
    experiment_name: urban-seg
    tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,http://localhost:5000}
  wandb:
    project: urban-seg
    entity: ${oc.env:WANDB_ENTITY,""}
    enabled: false
