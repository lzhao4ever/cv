# @package _global_.deployment
host: "0.0.0.0"
port: 8080
workers: 1

onnx:
  opset_version: 17
  dynamic_axes:
    input: {0: batch, 2: height, 3: width}
    output: {0: batch, 2: height, 3: width}
  simplify: true

triton:
  model_repository: ${oc.env:TRITON_MODEL_REPO,/models}
  max_batch_size: 8
  preferred_batch_size: [1, 4, 8]

monitoring:
  prometheus_port: 9090
  otlp_endpoint: ${oc.env:OTLP_ENDPOINT,""}
  enable_tracing: false
