name: dino_r50
backbone:
  type: resnet50
  pretrained: true
  freeze_at: 1
  out_indices: [1, 2, 3]

neck:
  type: ChannelMapper
  in_channels: [512, 1024, 2048]
  kernel_size: 1
  out_channels: 256
  num_outs: 4  # adds P2 via extra conv

transformer:
  type: DINOTransformer
  hidden_dim: 256
  num_queries: 900
  num_encoder_layers: 6
  num_decoder_layers: 6
  nhead: 8
  dim_feedforward: 2048
  dropout: 0.0
  num_patterns: 0
  # Denoising
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  # Mixed query selection
  num_select: 300

criterion:
  type: DINOCriterion
  num_classes: ${data.num_classes}
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
  weight_dict:
    loss_ce: 1.0
    loss_bbox: 5.0
    loss_giou: 2.0
  losses: [labels, boxes]
  dn_weight: 1.0
