apiVersion: apps/v1
kind: Deployment
metadata:
  name: urban-det-serve
  namespace: urban-det
spec:
  replicas: 2
  selector:
    matchLabels:
      app: urban-det-serve
  template:
    metadata:
      labels:
        app: urban-det-serve
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: serve
          image: your-registry/urban-det-serve:latest
          ports:
            - containerPort: 8080
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "0"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
