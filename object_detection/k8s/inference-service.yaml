apiVersion: v1
kind: Service
metadata:
  name: urban-det-serve
  namespace: urban-det
spec:
  selector:
    app: urban-det-serve
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: urban-det-serve-hpa
  namespace: urban-det
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: urban-det-serve
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
