defaults:
  - data: cityscapes
  - model: segformer_b2
  - training: default
  - deployment: default
  - _self_

project:
  name: urban-seg
  tags: [segmentation, urban, traffic]

paths:
  data_root: ${oc.env:DATA_ROOT,data}
  output_dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  checkpoint_dir: ${paths.output_dir}/checkpoints

seed: 42
