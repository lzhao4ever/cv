apiVersion: v1
kind: Service
metadata:
  name: urban-seg-serve
  namespace: urban-seg
spec:
  selector:
    app: urban-seg-serve
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: urban-seg-serve-hpa
  namespace: urban-seg
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: urban-seg-serve
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
